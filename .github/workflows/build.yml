name: PlatformIO CI Build

# 1. When should this automation run? 
# (Every time we push code or create a pull request)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. What should the automation do?
jobs:
  build:
    # We rent a free temporary Linux server from GitHub
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout the code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python (PlatformIO needs Python)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ Install PlatformIO Core
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: 🚀 Build the ESP32 Firmware
      run: pio run

    - name: Save Compiled Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-Compiled-Firmware
        path: .pio/build/